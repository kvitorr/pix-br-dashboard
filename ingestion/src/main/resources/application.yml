spring:
  application:
    name: pix-dashboard

  datasource:
    url: jdbc:postgresql://localhost:5432/pix_dashboard
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=43200s
    cache-names: municipio-serie,evolucao-temporal,municipiosAtipicos,visao-geral,disparidade-regional,fatores-socioeconomicos,municipios-lista,municipio-detalhes
