services:
  postgres:
    image: postgres:15
    container_name: pix_postgres
    environment:
      POSTGRES_DB: pix_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pix_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:latest
    container_name: pix_metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_DBNAME: pix_dashboard
      MB_DB_USER: postgres
      MB_DB_PASS: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
